<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vibe Button</title>

<style>
body{
    font-family: sans-serif;
    background: #fff0f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:300px;
    padding:20px;
    border-radius:20px;
    background:white;
    box-shadow:0 0 20px pink;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#ff4da6;
    color:white;
    font-size:16px;
}
</style>
</head>
<body>

<div class="card">
    <h2>💗 Vibe App</h2>

    <input id="myId" placeholder="my id">
    <input id="target" placeholder="target id">

    <button onclick="connect()">connect</button>
    <button onclick="vibe()">💗 VIBE</button>

    <p id="status"></p>
</div>

<script src="app.js"></script>

</body>
</html>
