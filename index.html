<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Signal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💗 Pink Signal</h1>

    <select id="role">
        <option value="client">Клиент</option>
        <option value="sender">Отправитель</option>
    </select>

    <input
        type="text"
        id="myId"
        placeholder="Введите свой ID"
    >

    <button id="connectBtn">
        Подключиться
    </button>

    <div id="senderPanel" class="hidden">

        <input
            type="text"
            id="targetId"
            placeholder="ID клиента"
        >

        <button id="sendBtn">
            💗 Отправить вибрацию
        </button>

    </div>

    <div id="status">
        Не подключено
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
